<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0f">
<title>SGX Pulse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600&family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --bg2: #111118;
    --bg3: #1a1a24;
    --card: #14141e;
    --card2: #1c1c28;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0f0f8;
    --text2: #9090a8;
    --text3: #5a5a70;
    --accent: #4f8ef7;
    --accent2: #6fa3ff;
    --green: #34c98a;
    --green-bg: rgba(52,201,138,0.1);
    --red: #ff5a6a;
    --red-bg: rgba(255,90,106,0.1);
    --amber: #f0a832;
    --amber-bg: rgba(240,168,50,0.1);
    --purple: #a78bfa;
    --purple-bg: rgba(167,139,250,0.1);
    --safe-top: env(safe-area-inset-top, 44px);
    --safe-bottom: env(safe-area-inset-bottom, 34px);
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  #app {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  /* STATUS BAR AREA */
  .status-bar {
    height: var(--safe-top);
    background: rgba(10,10,15,0.92);
    backdrop-filter: blur(20px);
    flex-shrink: 0;
  }

  /* HEADER */
  .header {
    background: rgba(10,10,15,0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 0.5px solid var(--border);
    padding: 12px 20px 14px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-left {}
  .app-title {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--text);
    line-height: 1;
  }
  .app-subtitle {
    font-size: 11px;
    color: var(--text3);
    margin-top: 3px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.05em;
  }
  .scan-btn {
    background: var(--accent);
    border: none;
    border-radius: 22px;
    padding: 9px 18px;
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s ease;
    white-space: nowrap;
    letter-spacing: 0.01em;
  }
  .scan-btn:active { transform: scale(0.95); opacity: 0.85; }
  .scan-btn:disabled {
    background: var(--bg3);
    color: var(--text3);
    cursor: default;
  }

  /* PROGRESS BAR */
  .progress-bar-wrap {
    height: 2px;
    background: var(--bg3);
    flex-shrink: 0;
    overflow: hidden;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .progress-bar-wrap.visible { opacity: 1; }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--purple));
    border-radius: 1px;
    width: 0%;
    transition: width 0.5s ease;
  }

  /* SUMMARY STRIP */
  .summary-strip {
    display: flex;
    gap: 10px;
    padding: 12px 20px;
    flex-shrink: 0;
    overflow-x: auto;
    scrollbar-width: none;
    border-bottom: 0.5px solid var(--border);
    background: var(--bg2);
  }
  .summary-strip::-webkit-scrollbar { display: none; }
  .stat-pill {
    background: var(--card);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    padding: 8px 14px;
    flex-shrink: 0;
    min-width: 80px;
    text-align: center;
  }
  .stat-num {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }
  .stat-num.green { color: var(--green); }
  .stat-num.red { color: var(--red); }
  .stat-num.amber { color: var(--amber); }
  .stat-label {
    font-size: 10px;
    color: var(--text3);
    margin-top: 3px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.03em;
  }

  /* SCROLL LIST */
  .list {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    padding: 12px 16px;
    padding-bottom: calc(var(--safe-bottom) + 60px);
    scrollbar-width: none;
  }
  .list::-webkit-scrollbar { display: none; }

  /* COMPANY CARD */
  .company-card {
    background: var(--card);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .company-card.expanded {
    border-color: var(--border2);
  }

  .card-header {
    display: flex;
    align-items: center;
    padding: 14px 16px;
    gap: 12px;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
  }
  .card-header:active { background: var(--card2); }

  .company-avatar {
    width: 40px; height: 40px;
    border-radius: 10px;
    background: var(--bg3);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
    color: var(--text2);
    flex-shrink: 0;
    font-family: 'DM Mono', monospace;
    border: 0.5px solid var(--border);
  }

  .card-meta { flex: 1; min-width: 0; }
  .company-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .company-sub {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 3px;
    flex-wrap: wrap;
  }
  .company-ticker {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    color: var(--text3);
    letter-spacing: 0.05em;
  }

  .pill {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 5px;
    letter-spacing: 0.02em;
  }
  .pill-green { background: var(--green-bg); color: var(--green); }
  .pill-red { background: var(--red-bg); color: var(--red); }
  .pill-amber { background: var(--amber-bg); color: var(--amber); }
  .pill-gray { background: rgba(144,144,168,0.1); color: var(--text2); }
  .pill-purple { background: var(--purple-bg); color: var(--purple); }

  .card-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
    flex-shrink: 0;
  }
  .chevron {
    font-size: 11px;
    color: var(--text3);
    transition: transform 0.25s ease;
    display: block;
  }
  .expanded .chevron { transform: rotate(180deg); }

  .loading-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 1.2s infinite ease-in-out;
  }
  @keyframes pulse {
    0%,100% { opacity: 0.3; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1); }
  }

  /* CARD BODY */
  .card-body {
    border-top: 0.5px solid var(--border);
    display: none;
    animation: slideDown 0.2s ease;
  }
  .expanded .card-body { display: block; }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .summary-text {
    padding: 14px 16px;
    font-size: 13px;
    color: var(--text2);
    line-height: 1.65;
    font-family: 'Syne', sans-serif;
    font-weight: 400;
    border-bottom: 0.5px solid var(--border);
  }

  .section-label {
    padding: 10px 16px 6px;
    font-size: 10px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .key-points {
    padding: 0 16px 10px;
  }
  .key-point {
    display: flex;
    gap: 8px;
    font-size: 12px;
    color: var(--text2);
    line-height: 1.5;
    padding: 4px 0;
  }
  .key-point::before {
    content: '·';
    color: var(--accent);
    flex-shrink: 0;
    font-size: 16px;
    line-height: 1.2;
  }

  .articles-list {
    padding: 0 12px 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    border-top: 0.5px solid var(--border);
    padding-top: 8px;
  }
  .article-item {
    background: var(--bg3);
    border-radius: var(--radius-sm);
    padding: 11px 13px;
    text-decoration: none;
    display: flex;
    gap: 10px;
    align-items: flex-start;
    border: 0.5px solid var(--border);
    transition: border-color 0.15s;
  }
  .article-item:active { border-color: var(--accent); }
  .article-num {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    color: var(--text3);
    flex-shrink: 0;
    margin-top: 1px;
    min-width: 16px;
  }
  .article-content { flex: 1; min-width: 0; }
  .article-title {
    font-size: 12px;
    color: var(--accent2);
    line-height: 1.45;
    font-weight: 500;
  }
  .article-meta {
    font-size: 10px;
    color: var(--text3);
    margin-top: 3px;
    font-family: 'DM Mono', monospace;
  }
  .article-impact {
    flex-shrink: 0;
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    margin-top: 2px;
  }
  .article-impact.pos { color: var(--green); }
  .article-impact.neg { color: var(--red); }
  .article-impact.neu { color: var(--text3); }

  /* EMPTY STATE */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 40px;
    gap: 12px;
    text-align: center;
  }
  .empty-icon {
    width: 64px; height: 64px;
    border-radius: 18px;
    background: var(--card);
    border: 0.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
    margin-bottom: 4px;
  }
  .empty-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.3px;
  }
  .empty-desc {
    font-size: 13px;
    color: var(--text3);
    line-height: 1.5;
    max-width: 220px;
  }

  /* BOTTOM TAB BAR */
  .tab-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: calc(49px + var(--safe-bottom));
    background: rgba(10,10,15,0.94);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 0.5px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-around;
    padding-top: 10px;
    z-index: 10;
  }
  .tab-item {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    font-size: 10px; color: var(--text3);
    cursor: pointer;
    padding: 0 16px;
    transition: color 0.15s;
  }
  .tab-item.active { color: var(--accent); }
  .tab-icon { font-size: 20px; line-height: 1; }

  /* LOADING STATE card */
  .card-loading {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 16px;
    font-size: 12px; color: var(--text3);
    font-family: 'DM Mono', monospace;
    border-top: 0.5px solid var(--border);
  }

  /* TOAST */
  .toast {
    position: absolute;
    top: calc(var(--safe-top) + 70px);
    left: 50%;
    transform: translateX(-50%) translateY(-10px);
    background: var(--card2);
    border: 0.5px solid var(--border2);
    border-radius: 22px;
    padding: 10px 20px;
    font-size: 13px;
    color: var(--text);
    white-space: nowrap;
    z-index: 100;
    opacity: 0;
    transition: all 0.3s ease;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .last-run-badge {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    color: var(--text3);
    background: var(--bg3);
    border-radius: 6px;
    padding: 3px 8px;
    border: 0.5px solid var(--border);
  }
</style>
</head>
<body>
<div id="app">
  <div class="status-bar"></div>
  <div class="header">
    <div class="header-left">
      <div class="app-title">SGX Pulse</div>
      <div class="app-subtitle" id="header-sub">10 SGX stocks · AI news agent</div>
    </div>
    <button class="scan-btn" id="scan-btn" onclick="startScan()">Scan now</button>
  </div>

  <div class="progress-bar-wrap" id="progress-wrap">
    <div class="progress-bar-fill" id="progress-fill"></div>
  </div>

  <div class="summary-strip" id="summary-strip" style="display:none">
    <div class="stat-pill">
      <div class="stat-num" id="stat-total">0</div>
      <div class="stat-label">scanned</div>
    </div>
    <div class="stat-pill">
      <div class="stat-num amber" id="stat-high">0</div>
      <div class="stat-label">high impact</div>
    </div>
    <div class="stat-pill">
      <div class="stat-num green" id="stat-pos">0</div>
      <div class="stat-label">positive</div>
    </div>
    <div class="stat-pill">
      <div class="stat-num red" id="stat-neg">0</div>
      <div class="stat-label">negative</div>
    </div>
    <div class="stat-pill">
      <div class="stat-num" id="stat-mixed" style="color:var(--text2)">0</div>
      <div class="stat-label">neutral/mixed</div>
    </div>
  </div>

  <div class="list" id="list">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">📡</div>
      <div class="empty-title">SGX Pulse</div>
      <div class="empty-desc">Tap "Scan now" to fetch today's market-moving news for your 10 SGX stocks</div>
    </div>
  </div>

  <div class="tab-bar">
    <div class="tab-item active">
      <div class="tab-icon">📰</div>
      <span>News</span>
    </div>
    <div class="tab-item" onclick="showToast('Watchlist coming soon')">
      <div class="tab-icon">⭐</div>
      <span>Watchlist</span>
    </div>
    <div class="tab-item" onclick="showToast('Alerts coming soon')">
      <div class="tab-icon">🔔</div>
      <span>Alerts</span>
    </div>
    <div class="tab-item" onclick="showToast('Settings coming soon')">
      <div class="tab-icon">⚙️</div>
      <span>Settings</span>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const COMPANIES = [
  { name: "ST Engineering", ticker: "S63.SI", sector: "Defence & Engineering", initials: "STE" },
  { name: "AEM Holdings", ticker: "AWX.SI", sector: "Semiconductor Equipment", initials: "AEM" },
  { name: "OCBC Bank", ticker: "O39.SI", sector: "Banking", initials: "OBC" },
  { name: "DBS Group", ticker: "D05.SI", sector: "Banking", initials: "DBS" },
  { name: "Keppel Corp", ticker: "BN4.SI", sector: "Infrastructure", initials: "KEP" },
  { name: "Sembcorp Ind", ticker: "U96.SI", sector: "Energy & Urban", initials: "SCI" },
  { name: "CapitaLand Inv", ticker: "9CI.SI", sector: "Real Estate", initials: "CLI" },
  { name: "IHH Healthcare", ticker: "Q0F.SI", sector: "Healthcare", initials: "IHH" },
  { name: "Singapore Airlines", ticker: "C6L.SI", sector: "Aviation", initials: "SIA" },
  { name: "Singtel", ticker: "Z74.SI", sector: "Telecommunications", initials: "STL" }
];

let results = {};
let expandedCards = new Set();
let scanning = false;

function getSentimentPill(sentiment) {
  const map = {
    Positive: '<span class="pill pill-green">↑ Positive</span>',
    Negative: '<span class="pill pill-red">↓ Negative</span>',
    Mixed: '<span class="pill pill-amber">~ Mixed</span>',
    Neutral: '<span class="pill pill-gray">– Neutral</span>'
  };
  return map[sentiment] || map.Neutral;
}

function getImpactPill(impact) {
  const map = {
    High: '<span class="pill pill-amber">High</span>',
    Medium: '<span class="pill pill-purple">Med</span>',
    Low: '<span class="pill pill-gray">Low</span>'
  };
  return map[impact] || map.Low;
}

function renderCards() {
  const list = document.getElementById('list');
  const emptyState = document.getElementById('empty-state');

  if (Object.keys(results).length === 0 && !scanning) {
    emptyState.style.display = 'flex';
    return;
  }
  emptyState.style.display = 'none';

  COMPANIES.forEach(company => {
    const existing = document.getElementById('card-' + company.ticker);
    const result = results[company.ticker];
    const isLoading = scanning && !result;
    const isExpanded = expandedCards.has(company.ticker);

    if (!existing) {
      const card = document.createElement('div');
      card.className = 'company-card' + (isExpanded ? ' expanded' : '');
      card.id = 'card-' + company.ticker;
      list.appendChild(card);
    }

    const card = document.getElementById('card-' + company.ticker);
    if (!card) return;
    if (isExpanded) card.classList.add('expanded');

    let bodyHtml = '';
    if (isLoading) {
      bodyHtml = `<div class="card-body"><div class="card-loading"><div class="loading-dot"></div>Searching web for latest news...</div></div>`;
    } else if (result) {
      const articles = (result.articles || []).map((a, i) => {
        const impactClass = a.priceImpact && a.priceImpact.startsWith('+') ? 'pos' : a.priceImpact && a.priceImpact.startsWith('-') ? 'neg' : 'neu';
        return `<a class="article-item" href="${a.url || '#'}" target="_blank" rel="noopener">
          <div class="article-num">0${i+1}</div>
          <div class="article-content">
            <div class="article-title">${a.title || 'Article'}</div>
            <div class="article-meta">${a.source || ''}${a.date ? ' · ' + a.date : ''}</div>
          </div>
          ${a.priceImpact ? `<div class="article-impact ${impactClass}">${a.priceImpact}</div>` : ''}
        </a>`;
      }).join('');

      const keyPts = (result.keyPoints || []).map(p => `<div class="key-point">${p}</div>`).join('');

      bodyHtml = `<div class="card-body">
        <div class="summary-text">${result.summary || 'No summary available.'}</div>
        ${keyPts ? `<div class="section-label">Key price drivers</div><div class="key-points">${keyPts}</div>` : ''}
        ${articles ? `<div class="section-label">Source articles</div><div class="articles-list">${articles}</div>` : ''}
      </div>`;
    }

    card.innerHTML = `
      <div class="card-header" onclick="toggleCard('${company.ticker}')">
        <div class="company-avatar">${company.initials}</div>
        <div class="card-meta">
          <div class="company-name">${company.name}</div>
          <div class="company-sub">
            <span class="company-ticker">${company.ticker}</span>
            ${result ? getSentimentPill(result.sentiment) : ''}
            ${result ? getImpactPill(result.impact) : ''}
          </div>
        </div>
        <div class="card-right">
          ${isLoading ? '<div class="loading-dot"></div>' : result ? '<span class="chevron">▾</span>' : ''}
        </div>
      </div>
      ${bodyHtml}
    `;

    if (isExpanded) card.classList.add('expanded');
  });
}

function toggleCard(ticker) {
  if (!results[ticker]) return;
  const card = document.getElementById('card-' + ticker);
  if (!card) return;
  if (expandedCards.has(ticker)) {
    expandedCards.delete(ticker);
    card.classList.remove('expanded');
  } else {
    expandedCards.add(ticker);
    card.classList.add('expanded');
  }
}

function updateStats() {
  const vals = Object.values(results);
  document.getElementById('stat-total').textContent = vals.length;
  document.getElementById('stat-high').textContent = vals.filter(r => r.impact === 'High').length;
  document.getElementById('stat-pos').textContent = vals.filter(r => r.sentiment === 'Positive').length;
  document.getElementById('stat-neg').textContent = vals.filter(r => r.sentiment === 'Negative').length;
  document.getElementById('stat-mixed').textContent = vals.filter(r => r.sentiment === 'Neutral' || r.sentiment === 'Mixed').length;

  if (vals.length > 0) {
    document.getElementById('summary-strip').style.display = 'flex';
  }
}

async function fetchCompanyNews(company) {
  const today = new Date().toLocaleDateString('en-SG', { day: 'numeric', month: 'long', year: 'numeric' });
  const prompt = `You are a financial news analyst. Search the web for the LATEST news today (${today}) about ${company.name} (SGX: ${company.ticker}), a Singapore-listed ${company.sector} company.

Find 3-5 recent news articles from the past 48 hours that could impact ${company.name}'s share price. Focus on: earnings, contracts, analyst ratings, M&A, regulatory changes, dividends, sector trends.

Return ONLY valid JSON (no markdown, no preamble):
{
  "summary": "2-3 sentence summary of most important news and likely share price impact",
  "sentiment": "Positive|Negative|Neutral|Mixed",
  "impact": "High|Medium|Low",
  "keyPoints": ["point 1", "point 2", "point 3"],
  "articles": [
    {"title": "headline", "url": "https://...", "source": "Publication", "date": "DD Mon YYYY", "priceImpact": "+/-/neutral"}
  ]
}`;

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      tools: [{ type: 'web_search_20250305', name: 'web_search' }],
      messages: [{ role: 'user', content: prompt }]
    })
  });

  if (!res.ok) throw new Error('API ' + res.status);
  const data = await res.json();
  const text = data.content.filter(b => b.type === 'text').map(b => b.text).join('');
  const clean = text.replace(/```json|```/g, '').trim();
  const match = clean.match(/\{[\s\S]*\}/);
  if (!match) throw new Error('No JSON');
  return JSON.parse(match[0]);
}

async function startScan() {
  if (scanning) return;
  scanning = true;
  results = {};
  expandedCards.clear();

  document.getElementById('scan-btn').disabled = true;
  document.getElementById('scan-btn').textContent = 'Scanning...';
  document.getElementById('progress-wrap').classList.add('visible');
  document.getElementById('header-sub').textContent = 'Searching live web...';

  const emptyState = document.getElementById('empty-state');
  emptyState.style.display = 'none';

  const list = document.getElementById('list');
  while (list.firstChild && list.firstChild.id !== 'empty-state') {
    if (list.firstChild.className && list.firstChild.className.includes('company-card')) {
      list.removeChild(list.firstChild);
    } else break;
  }
  list.innerHTML = '';

  renderCards();

  let done = 0;
  for (const company of COMPANIES) {
    renderCards();
    try {
      const result = await fetchCompanyNews(company);
      results[company.ticker] = result;
    } catch(e) {
      results[company.ticker] = {
        summary: 'Unable to retrieve news at this time. Please try again.',
        sentiment: 'Neutral', impact: 'Low', keyPoints: [], articles: []
      };
    }
    done++;
    const pct = Math.round((done / COMPANIES.length) * 100);
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('scan-btn').textContent = `${pct}%`;
    updateStats();
    renderCards();
    if (done < COMPANIES.length) await new Promise(r => setTimeout(r, 600));
  }

  scanning = false;
  document.getElementById('scan-btn').disabled = false;
  document.getElementById('scan-btn').textContent = 'Refresh';
  document.getElementById('progress-wrap').classList.remove('visible');

  const now = new Date();
  const timeStr = now.toLocaleTimeString('en-SG', { hour: '2-digit', minute: '2-digit' });
  document.getElementById('header-sub').textContent = `Updated ${timeStr} · ${COMPANIES.length} stocks`;

  showToast('Scan complete — ' + COMPANIES.length + ' stocks analysed');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}
</script>
